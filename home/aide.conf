# AIDE config for user-scope file integrity monitoring
# Invoked by ~/.local/bin/security-aide-home, scheduled via mcron.
#
# NB1: AIDE 0.19 requires rules to start with a literal '/' — macro expansion
#      with @@{VAR} works in values (database_in=...) but not at the start of
#      a rule line, so paths are hardcoded to /home/franz below.
#
# NB2: Files managed by `guix home` are symlinks into /gnu/store/... and their
#      targets change on every `guix home reconfigure`, producing constant
#      noise. We exclude symlinks from every directory that could contain
#      guix-home-provided entries. Exceptions: .ssh and .gnupg, where any
#      symlink would itself be suspicious.
#
# NB3: Guix-home-managed files (.bashrc, .gitconfig, etc.) are intentionally
#      NOT watched — their tamper-evidence comes from the dotfiles git repo
#      plus guix's reconfigure chain, not AIDE.

database_in=file:/home/franz/.local/state/aide/aide.db
database_out=file:/home/franz/.local/state/aide/aide.db.new

report_url=stdout

# Rule groups
# p     = permissions      u = user    g = group
# ftype = file type        l = link target (symlinks only)
# sha512 = content hash (regular files only)
#
# We deliberately do NOT track mtime/ctime/size:
#   - Directory m/c bumps whenever any entry inside is touched (e.g. guix
#     home relinking files on reconfigure), which produces constant noise.
#   - Symlink m/c bumps whenever the link is recreated, even if the target
#     is identical.
#   - For regular files, sha512 already catches any content change; mtime
#     and size are redundant for integrity purposes.
NORMAL  = p+u+g+ftype+sha512+l

# ---------------------------------------------------------------------------
# Credentials and keys — watch EVERYTHING including symlinks, since a symlink
# appearing in ~/.ssh or ~/.gnupg would itself be a red flag.
# ---------------------------------------------------------------------------
/home/franz/\.ssh($|/) NORMAL

/home/franz/\.gnupg($|/) NORMAL
# Exclude gnupg runtime/ephemeral noise
!/home/franz/\.gnupg/random_seed$
!/home/franz/\.gnupg/\.#.*
!/home/franz/\.gnupg/S\..*
!/home/franz/\.gnupg/log-.*
!/home/franz/\.gnupg/crls\.d($|/)
!/home/franz/\.gnupg/openpgp-revocs\.d($|/)

# ---------------------------------------------------------------------------
# User-only shell init (real files, not guix-managed)
# ---------------------------------------------------------------------------
=/home/franz/\.zprofile$ NORMAL

# ---------------------------------------------------------------------------
# Git config dir (real dir with user-controlled files like the global ignore)
# ---------------------------------------------------------------------------
/home/franz/\.config/git($|/) NORMAL

# ---------------------------------------------------------------------------
# Persistence surfaces — mixed real + store-symlinked entries. The recursive
# negative rules exclude symlinks, so guix-home reconfigures don't produce
# noise but any new real file dropped by a human (or attacker) is caught.
# ---------------------------------------------------------------------------
/home/franz/\.config/autostart($|/) NORMAL
!/home/franz/\.config/autostart/.* l

/home/franz/\.local/share/applications($|/) NORMAL
!/home/franz/\.local/share/applications/.* l

# ---------------------------------------------------------------------------
# User binaries — same pattern. Catches real scripts dropped in ~/.local/bin
# (e.g. px-device-identity, shortuuid) but ignores the many store symlinks
# that guix home publishes there.
# ---------------------------------------------------------------------------
/home/franz/\.local/bin($|/) NORMAL
!/home/franz/\.local/bin/.* l

# Note: ~/dotfiles is NOT watched — the dotfiles git repo is its own
# tamper-evidence mechanism.
