# AIDE config for system-scope file integrity monitoring.
# Run as root by security-aide-system (daily, via system mcron). State lives
# in /var/lib/aide.
#
# NB1: AIDE 0.19 requires each rule line to start with a literal '/' — a
#      leading regex like `.*` is not allowed. A regex *after* the leading
#      slash is fine, so `/(root|home/[^/]+)/...` covers root plus any single
#      user home directory in one rule.
#
# NB2: Guix populates /etc mostly with symlinks into /gnu/store/... whose
#      targets churn on every reconfigure, producing constant noise. We drop
#      all symlinks under /etc (`!/etc/.* l`), which leaves the real files
#      (passwd, shadow, group, machine-id, ...) watched.

database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new

report_url=stdout

# Rule groups
# p     = permissions      u = user    g = group
# ftype = file type        l = link target (symlinks only)
# sha512 = content hash (regular files only)
#
# No mtime/ctime/size — dir/symlink churn produces noise; sha512 covers
# content for regular files.
NORMAL = p+u+g+ftype+sha512+l

# ---------------------------------------------------------------------------
# Credentials and keys — root's plus every user's ~/.ssh and ~/.gnupg. Watch
# EVERYTHING including symlinks, since a symlink appearing in a credential dir
# would itself be a red flag. /home/[^/]+ matches any single user home.
# ---------------------------------------------------------------------------
/(root|home/[^/]+)/\.ssh($|/) NORMAL
/(root|home/[^/]+)/\.gnupg($|/) NORMAL
# Exclude gnupg runtime/ephemeral noise
!/(root|home/[^/]+)/\.gnupg/random_seed$
!/(root|home/[^/]+)/\.gnupg/\.#.*
!/(root|home/[^/]+)/\.gnupg/S\..*
!/(root|home/[^/]+)/\.gnupg/log-.*
!/(root|home/[^/]+)/\.gnupg/crls\.d($|/)
!/(root|home/[^/]+)/\.gnupg/openpgp-revocs\.d($|/)

# ---------------------------------------------------------------------------
# /etc — real files only. Drop all symlinks (guix store churn), leaving
# passwd/shadow/group/machine-id etc.
# ---------------------------------------------------------------------------
/etc($|/) NORMAL
!/etc/.* l
!/etc/resolv\.conf$
!/etc/mtab$
!/etc/blkid\.tab.*
!/etc/ssl/certs($|/)

# ---------------------------------------------------------------------------
# /boot — kernel, initrd, bootloader.
# ---------------------------------------------------------------------------
/boot($|/) NORMAL
